name: Daily Nasdaq Report

on:
  schedule:
    # UTC 기준 시간입니다. 한국 시간(KST) 오전 7:30은 UTC로 오후 10:30 (전날)입니다.
    - cron: '50 7 * * *'
  workflow_dispatch: # 수동으로 실행하고 싶을 때 사용

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # v3에서 v4로 업데이트

    - name: Set up Python
      uses: actions/setup-python@v5 # v4에서 v5로 업데이트
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install yfinance pandas requests beautifulsoup4 lxml html5lib

    - name: Run script
      env:
        # 보안을 위해 토큰과 ID는 GitHub Secrets에 저장하는 것이 좋습니다.
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python stockbot.py
